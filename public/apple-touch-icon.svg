  <line x1="90" y1="58" x2="127" y2="122" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  <line x1="53" y1="122" x2="127" y2="122" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.75"/>

